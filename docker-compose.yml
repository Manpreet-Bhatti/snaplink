services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: snaplink
      POSTGRES_PASSWORD: snaplink
      POSTGRES_DB: snaplink
    ports:
      - "5434:5432"
    volumes:
      - snaplink_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  snaplink_pgdata:
