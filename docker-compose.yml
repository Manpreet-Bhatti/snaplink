services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: snaplink
      POSTGRES_PASSWORD: snaplink
      POSTGRES_DB: snaplink
    ports:
      - "5434:5432"
    volumes:
      - snaplink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snaplink"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://snaplink:snaplink@db:5432/snaplink
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env, see .env.example}
      IP_HASH_SALT: ${IP_HASH_SALT:?set IP_HASH_SALT in .env, see .env.example}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - app
    ports:
      - "8080:80"

volumes:
  snaplink_pgdata:
